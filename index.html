<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appréciations Collège Luqman</title>
<style>
:root{--vert:#1a7a6e;--vd:#145f55;--ora:#e8671a;--bg:#f0f2f0;--card:#fff;--bor:#dde8e6;--txt:#1a1a1a;--mut:#5a7570}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
.hdr{background:var(--vert);padding:14px 16px}
.hdr h1{font-size:19px;font-weight:700;color:#fff}
.bod{padding:14px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:8px;border:1.5px solid var(--bor);background:var(--card);font-size:14px;cursor:pointer;color:var(--mut);flex:1;text-align:center}
.tab.on{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.sec{display:none}.sec.on{display:block}
.card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:14px;margin-bottom:14px}
.sl{font-size:11px;font-weight:700;color:var(--vert);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 7px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px}
.chip{padding:5px 11px;border-radius:99px;border:1.5px solid var(--bor);background:var(--card);font-size:13px;cursor:pointer;color:var(--mut);user-select:none}
.chip.gen.on{background:#e6f4f1;color:var(--vd);border-color:var(--vert)}
.chip.pos.on{background:#e6f4f1;color:var(--vd);border-color:var(--vert)}
.chip.neg.on{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.chip.comp.on{background:#fef0e6;color:#7a3a0a;border-color:var(--ora)}
.chip.prog.on{background:#e6f4f1;color:var(--vd);border-color:var(--vert)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{font-size:13px;color:var(--mut);display:block;margin-bottom:4px}
input,select{width:100%;font-size:14px;padding:8px 10px;border:1.5px solid var(--bor);border-radius:8px;background:var(--card);color:var(--txt)}
input:focus,select:focus{outline:none;border-color:var(--vert)}
.gr{display:flex;gap:8px}
.grb{padding:7px 14px;border-radius:99px;border:1.5px solid var(--bor);background:var(--card);font-size:13px;cursor:pointer;color:var(--mut)}
.grb.on{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
button.a{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;border:1.5px solid var(--bor);background:var(--card);font-size:13px;cursor:pointer;color:var(--txt)}
button.a:hover{background:#f0f7f6}
button.a.p{background:var(--ora);border-color:var(--ora);color:#fff;font-weight:600}
button.a.p:hover{background:#d45e15}
.rb{background:#f4faf9;border:1.5px solid var(--vert);border-radius:10px;padding:13px;margin-top:10px}
.rt{font-size:14px;line-height:1.75;min-height:44px;white-space:pre-wrap}
.hint{font-size:12px;color:var(--mut);margin-top:5px}
.stag{font-size:12px;padding:2px 8px;border-radius:99px;background:#e6f4f1;color:var(--vd);border:1px solid var(--vert);display:inline-block;margin:2px}
.stags{display:flex;flex-wrap:wrap;margin:6px 0 2px;min-height:20px}
hr{border:none;border-top:1px solid var(--bor);margin:12px 0}
.ei{display:flex;align-items:flex-start;gap:8px;padding:10px 11px;background:var(--card);border:1px solid var(--bor);border-radius:8px;margin-bottom:8px}
.ein{flex:1;min-width:0}
.en{font-size:14px;font-weight:600;color:var(--vd)}
.em{font-size:12px;color:var(--mut);margin-top:2px}
.ep{font-size:13px;line-height:1.55;margin-top:5px}
.ib{padding:5px 9px;font-size:12px;border-radius:7px;border:1px solid var(--bor);background:var(--card);cursor:pointer;color:var(--mut)}
.ib:hover{background:#f0f7f6}
.ib.d:hover{background:#FCEBEB;color:#A32D2D}
.emp{font-size:13px;color:var(--mut);font-style:italic;padding:10px 0}
.fb{padding:5px 11px;border-radius:99px;border:1.5px solid var(--bor);background:var(--card);font-size:13px;cursor:pointer;color:var(--mut)}
.fb.on{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.fr{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.fs{font-size:13px;padding:5px 8px;border:1px solid #ccc;border-radius:8px;background:#fff;width:auto}
.cnt{font-size:12px;color:var(--mut);margin-left:auto}
.ok{background:#e6f4f1;color:var(--vd);border:1px solid var(--vert);border-radius:8px;padding:8px 11px;font-size:13px;margin-top:9px;display:none}
.ebox{background:#f4faf9;border:1px solid var(--bor);border-radius:10px;padding:11px;font-size:13px;line-height:1.85;white-space:pre-wrap;min-height:50px}
@media(max-width:400px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr"><h1>📋 Appréciations Collège Luqman</h1></div>
<div class="bod">
<div class="tabs">
  <button class="tab on" onclick="setTab('gen')">✦ Générer</button>
  <button class="tab" onclick="setTab('lst')">👥 Élèves <span id="bdg"></span></button>
  <button class="tab" onclick="setTab('exp')">↗ Export</button>
</div>

<div id="gen" class="sec on">
<div class="card">
  <div class="g2">
    <div><label>Prénom</label><input type="text" id="prenom" placeholder="Ex: Lucas"></div>
    <div><label>Classe</label><select id="classe" onchange="onClasse()"><option>6e</option><option>5e</option><option>4e</option><option>3e</option></select></div>
  </div>
  <div class="g2">
    <div><label>Matière</label><select id="matiere" onchange="onMatiere()"></select></div>
    <div><label>Genre</label><div class="gr"><button class="grb on" id="gm" onclick="setG('M')">Garçon</button><button class="grb" id="gf" onclick="setG('F')">Fille</button></div></div>
  </div>
  <div class="sl">Général — toutes matières</div><div class="chips" id="cp-gen"></div>
  <div class="sl" id="lpos">Points positifs</div><div class="chips" id="cp-pos"></div>
  <div class="sl" id="lneg">Points à travailler</div><div class="chips" id="cp-neg"></div>
  <div class="sl">Comportement</div><div class="chips" id="cp-comp"></div>
  <div class="sl">Progression</div><div class="chips" id="cp-prog"></div>
  <hr>
  <div style="margin-bottom:10px">
    <label>Mots libres <span style="font-weight:400;color:var(--mut)">(sport, contexte… virgules)</span></label>
    <input type="text" id="free" placeholder="Ex: badminton, ULIS…" oninput="renderTags()">
  </div>
  <div style="font-size:12px;color:var(--mut);margin-bottom:3px">Mots-clés sélectionnés :</div>
  <div class="stags" id="stags"><span style="font-size:12px;color:#aaa;font-style:italic">Aucun</span></div>
  <div class="brow">
    <button class="a p" onclick="generer()">⚡ Générer</button>
    <button class="a" onclick="regenerer()">↺ Regénérer</button>
    <button class="a" onclick="resetForm()">✕ Réinitialiser</button>
  </div>
  <div id="rz" style="display:none" class="rb">
    <div style="font-size:12px;color:var(--mut);margin-bottom:5px" id="rl">Phrase générée</div>
    <div id="rt" class="rt"></div>
    <div class="hint">Enregistrer pour sauvegarder.</div>
    <div class="brow">
      <button class="a p" onclick="enregistrer()">💾 Enregistrer</button>
      <button class="a" onclick="copierPhrase()">⎘ Copier</button>
    </div>
    <div class="ok" id="ok">✓ Enregistré !</div>
  </div>
</div>
</div>

<div id="lst" class="sec">
  <div class="fr">
    <button class="fb on" onclick="filtrer('toutes',this)">Toutes</button>
    <button class="fb" onclick="filtrer('6e',this)">6e</button>
    <button class="fb" onclick="filtrer('5e',this)">5e</button>
    <button class="fb" onclick="filtrer('4e',this)">4e</button>
    <button class="fb" onclick="filtrer('3e',this)">3e</button>
    <span class="cnt" id="cnt"></span>
  </div>
  <div class="fr">
    <select class="fs" id="fm" onchange="renderListe()">
      <option value="t">Toutes matières</option>
      <option>Français</option><option>Maths</option><option>Anglais</option><option>Arabe</option>
      <option>Espagnol</option><option>Histoire-Géo/EMC</option><option>SVT</option>
      <option>Physique-Chimie</option><option>Technologie</option>
      <option>Arts Plastiques</option><option>Éducation Musicale</option><option>EPS</option>
    </select>
    <select class="fs" id="ft" onchange="renderListe()">
      <option value="t">Tous trimestres</option>
      <option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option>
    </select>
    <select class="fs" id="fa" onchange="renderListe()"><option value="t">Toutes années</option></select>
  </div>
  <div id="elist"></div>
</div>

<div id="exp" class="sec">
  <div class="fr">
    <select class="fs" id="ecl" onchange="renderExp()"><option value="t">Toutes classes</option><option>6e</option><option>5e</option><option>4e</option><option>3e</option></select>
    <select class="fs" id="emat" onchange="renderExp()">
      <option value="t">Toutes matières</option>
      <option>Français</option><option>Maths</option><option>Anglais</option><option>Arabe</option>
      <option>Espagnol</option><option>Histoire-Géo/EMC</option><option>SVT</option>
      <option>Physique-Chimie</option><option>Technologie</option>
      <option>Arts Plastiques</option><option>Éducation Musicale</option><option>EPS</option>
    </select>
    <select class="fs" id="etr" onchange="renderExp()"><option value="t">Tous trimestres</option><option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option></select>
    <select class="fs" id="ean" onchange="renderExp()"><option value="t">Toutes années</option></select>
    <button class="a" style="margin-left:auto" onclick="copierExp()">⎘ Copier</button>
  </div>
  <div id="ecnt" class="ebox">Aucune appréciation.</div>
</div>
</div>

// Traductions adjectifs (accordés selon genre)
function adj(k,f){
  var m={"investi":["investi","investie"],"serieux":["sérieux","sérieuse"],"applique":["appliqué","appliquée"],
         "auto":["autonome","autonome"],"fairplay":["fair-play","fair-play"],"rigoureux":["rigoureux","rigoureuse"],
         "assidu":["assidu","assidue"],"respect":["respectueux","respectueuse"],"ponctuel":["ponctuel","ponctuelle"]};
  if(!m[k]) return null;
  return m[k][f?1:0];
}

// Formulations négatives naturelles (plusieurs variantes)
var NEG={
  "invest_n":[["l'investissement en cours doit s'améliorer"],["une plus grande implication est attendue"],["davantage d'engagement est nécessaire"]],
  "bavard":[["le bavardage perturbe le bon déroulement des séances"],["les bavardages nuisent à la concentration de la classe"],["le bavardage reste un obstacle à la progression"]],
  "concentr":[["la concentration doit être renforcée"],["un manque de concentration pénalise les résultats"],["une attention plus soutenue est nécessaire"]],
  "diff_tech":[["des lacunes techniques sont à combler"],["des bases techniques restent à consolider"],["la maîtrise technique est encore à développer"]],
  "retrait":[["une participation plus active est attendue"],["un investissement plus visible dans les activités est souhaité"],["la discrétion en cours nuit à la progression"]],
  "irreg":[["la régularité dans l'effort est à améliorer"],["l'investissement manque de constance"],["des résultats trop irréguliers freinent la progression"]],

  "expr_n":[["l'expression gagnerait à être enrichie"],["un travail sur l'expression est nécessaire"]],
  "lect_n":[["la lecture doit être davantage travaillée"],["des progrès en lecture sont attendus"]],
  "gram_n":[["la grammaire est encore à consolider"],["des lacunes grammaticales sont à combler"]],
  "particip_fn":[["la participation doit s'améliorer"],["une implication plus active en classe est attendue"]],
  "redac_n":[["la rédaction est encore insuffisante"],["des progrès en rédaction sont attendus"]],
  "concentr_f":[["la concentration doit être renforcée"],["un manque de concentration nuit aux résultats"]],
  "bavard_f":[["le bavardage nuit au bon déroulement du cours"],["les bavardages perturbent la classe"]],
  "calcul_n":[["le calcul est encore à renforcer"],["des lacunes en calcul sont à combler"]],
  "raison_n":[["le raisonnement doit être mieux structuré"],["des progrès en raisonnement sont attendus"]],
  "lacunes":[["des lacunes importantes sont à combler"],["des bases solides restent à acquérir"]],
  "method_mn":[["une méthode de travail est à acquérir"],["le manque de méthode pénalise les résultats"]],
  "concentr_m":[["la concentration doit être améliorée"],["un manque de concentration pénalise les résultats"]],

  "abstr_n":[["l'abstraction reste difficile à appréhender"],["des difficultés d'abstraction sont à surmonter"]],
  "particip_mn":[["la participation doit s'améliorer"],["une implication plus active est attendue"]],
  "vocab_an":[["le vocabulaire est à enrichir"],["des efforts sur le vocabulaire sont nécessaires"]],
  "gram_an":[["la grammaire est à consolider"],["des lacunes grammaticales sont à combler"]],
  "oral_an":[["l'expression orale est encore timide"],["l'oral doit être davantage travaillé"]],
  "particip_an":[["la participation doit s'améliorer"],["une implication plus active est attendue"]],

  "memo_an":[["la mémorisation du vocabulaire est insuffisante"],["des efforts de mémorisation sont nécessaires"]],

};
// Pour les clés non listées
function negDefaut(k){return [["des progrès sont attendus sur ce point"],["un effort particulier est à fournir"]];}

function getNeg(k,ri){var v=NEG[k]||negDefaut(k);return v[ri%v.length][0];}

// Joindre des noms avec "et" (pas de "de une" → "d'une")
function joinNoms(arr){
  if(!arr.length) return "";
  if(arr.length===1) return arr[0];
  return arr.slice(0,-1).join(", ")+" et "+arr[arr.length-1];
}
function joinAdjs(arr){
  if(!arr.length) return "";
  if(arr.length===1) return arr[0];
  return arr.slice(0,-1).join(", ")+" et "+arr[arr.length-1];
}

// ── ÉTAT ─────────────────────────────────────────────────────────────────────
var KEY="eps_v3";
var genre="M",sel={},filtreCur="toutes",phrase="",prenomCur="",classeCur="",matCur="",ri=0;

function db(){try{return JSON.parse(localStorage.getItem(KEY)||"[]");}catch(e){return[];}}
function dbS(d){localStorage.setItem(KEY,JSON.stringify(d));}
function trim(){var m=new Date().getMonth()+1;return m>=9?"T1":m<=3?"T2":"T3";}
function annee(){var n=new Date(),m=n.getMonth()+1,y=n.getFullYear();return m>=9?y+"-"+(y+1):(y-1)+"-"+y;}

// ── UI ───────────────────────────────────────────────────────────────────────
function onClasse(){
  var cl=document.getElementById("classe").value;
  var liste=cl==="6e"?M6:M5;
  var sel_mat=document.getElementById("matiere");
  sel_mat.innerHTML=liste.map(function(m){return "<option>"+m+"</option>";}).join("");
  onMatiere();
}
function onMatiere(){
  var mat=document.getElementById("matiere").value;
  matCur=mat;
  var data=MAT[mat]||MAT["EPS"];
  // Vider sélections pos/neg invalidées
  var valid=data.pos.concat(data.neg).map(function(c){return c.k;});
  Object.keys(sel).forEach(function(k){if((sel[k]==="pos"||sel[k]==="neg")&&valid.indexOf(k)<0)delete sel[k];});
  document.getElementById("lpos").textContent="Points positifs — "+mat;
  document.getElementById("lneg").textContent="Points à travailler — "+mat;
  renderAll();
}
function setG(g){
  genre=g;
  document.getElementById("gm").classList.toggle("on",g==="M");
  document.getElementById("gf").classList.toggle("on",g==="F");
}
function allC(){var r=[];[GEN,MAT[matCur]?MAT[matCur].pos:[],MAT[matCur]?MAT[matCur].neg:[],COMP,PROG].forEach(function(a){r=r.concat(a);});return r;}

function renderAll(){
  var mat=document.getElementById("matiere").value||"EPS";
  var data=MAT[mat]||MAT["EPS"];
  var cats={gen:GEN,pos:data.pos,neg:data.neg,comp:COMP,prog:PROG};
  Object.keys(cats).forEach(function(cat){
    var el=document.getElementById("cp-"+cat);
    if(!el)return;
    el.innerHTML="";
    cats[cat].forEach(function(c){
      var b=document.createElement("button");
      b.className="chip "+cat+(sel[c.k]?" on":"");
      b.textContent=c.l;
      b.onclick=(function(k,ca){return function(){tog(k,ca);};})(c.k,cat);
      el.appendChild(b);
    });
  });
  renderTags();
}
function tog(k,cat){if(sel[k])delete sel[k];else sel[k]=cat;renderAll();}
function renderTags(){
  var keys=Object.keys(sel);
  var fv=document.getElementById("free").value;
  var ft=fv?fv.split(",").map(function(s){return s.trim();}).filter(Boolean):[];
  var all=keys.concat(ft);
  var el=document.getElementById("stags");
  if(!all.length){el.innerHTML='<span style="font-size:12px;color:#aaa;font-style:italic">Aucun</span>';return;}
  el.innerHTML=all.map(function(k){var f=allC().filter(function(c){return c.k===k;})[0];return '<span class="stag">'+(f?f.l:k)+"</span>";}).join("");
}

// ── GÉNÉRATION ───────────────────────────────────────────────────────────────
function construire(keys,ft,f,Il,il,mat,ri){
  var gen=keys.filter(function(k){return sel[k]==="gen";});
  var pos=keys.filter(function(k){return sel[k]==="pos";});
  var neg=keys.filter(function(k){return sel[k]==="neg";});
  var comp=keys.filter(function(k){return sel[k]==="comp";});
  var prog=keys.filter(function(k){return sel[k]==="prog";});
  var compneg=comp.indexOf("compneg")>=0;
  var comppos=comp.filter(function(k){return k!=="compneg";});

  // Listes adjectifs et noms pour le positif
  var adjs=[];
  var noms=[];
  pos.concat(gen).forEach(function(k){
    var a=adj(k,f);
    if(a) adjs.push(a);
    else if(NOM[k]) noms.push(NOM[k]);
  });
  comppos.forEach(function(k){
    var a=adj(k,f);
    if(a) adjs.push(a);
    else if(NOM[k]) noms.push(NOM[k]);
  });

  var progL={"prog":"en progrès","progression":"une progression constante","potentiel":"un potentiel à exploiter","encour":"des résultats encourageants","hausse":"un trimestre en hausse","acquis":"des acquis solides"};
  var progNoms=prog.map(function(k){return progL[k]||k;});

  var hasPos=adjs.length+noms.length>0;
  var hasNeg=neg.length>0;
  var hasProg=prog.length>0;

  // Structures positives variées
  var structs_pos_adj_nom=[
    function(){return "Élève "+joinAdjs(adjs)+", "+il+" fait preuve de "+joinNoms(noms);},
    function(){return Il+" se montre "+joinAdjs(adjs)+" et témoigne de "+joinNoms(noms);},
    function(){return "Bon trimestre : "+il+" est "+joinAdjs(adjs)+" et fait preuve de "+joinNoms(noms);},
    function(){return Il+" affiche un profil encourageant : "+joinAdjs(adjs)+", avec "+joinNoms(noms);}
  ];
  var structs_pos_adj=[
    function(){return "Élève "+joinAdjs(adjs);},
    function(){return Il+" se montre "+joinAdjs(adjs)+" en cours";},
    function(){return "Bon trimestre : "+il+" est "+joinAdjs(adjs);}
  ];
  var structs_pos_nom=[
    function(){return Il+" fait preuve de "+joinNoms(noms);},
    function(){return "On retiendra de ce trimestre "+joinNoms(noms);},
    function(){return Il+" se distingue par "+joinNoms(noms);},
    function(){return "Bon travail : "+il+" témoigne de "+joinNoms(noms);}
  ];

  function buildPos(){
    if(adjs.length&&noms.length) return structs_pos_adj_nom[ri%structs_pos_adj_nom.length]();
    if(adjs.length) return structs_pos_adj[ri%structs_pos_adj.length]();
    if(noms.length) return structs_pos_nom[ri%structs_pos_nom.length]();
    return Il+" s'investit de manière satisfaisante";
  }

  // Formulations négatives
  function buildNeg(){
    var phrases=neg.map(function(k){return getNeg(k,ri);});
    if(phrases.length===1) return phrases[0];
    return phrases.slice(0,-1).join(", ")+" et "+phrases[phrases.length-1];
  }

  // Conclusions positives variées
  var concBon=["Bon trimestre.","À poursuivre.","Continuons dans cette dynamique.","Ces efforts sont à saluer."];
  var concExc=["Excellent trimestre, félicitations !","Très bon trimestre !","Bravo pour ce travail !","Des résultats à la hauteur de l'engagement."];
  var isExc=(pos.length+gen.length)>=3;
  var conclu=(isExc?concExc:concBon)[ri%(isExc?concExc:concBon).length];

  // Liaisons négatif
  var liaisons=["Cependant, ","Toutefois, ","Il est à noter que ","Un point de vigilance : "];
  var liai=liaisons[ri%liaisons.length];

  var p="";

  if(hasPos&&hasNeg){
    p=buildPos()+". "+liai+buildNeg()+".";
    if(hasProg&&prog.indexOf("potentiel")<0) p+=" "+Il+" affiche néanmoins "+joinNoms(progNoms)+".";
  } else if(hasPos){
    p=buildPos()+". ";
    if(hasProg) p+=Il+" affiche "+joinNoms(progNoms)+". "+conclu;
    else p+=conclu;
  } else if(hasNeg){
    if(neg.indexOf("perturb")>=0){
      var pp=[Il+" perturbe le bon déroulement des cours. Une attitude plus respectueuse est indispensable.",
              "Le comportement de "+il+" nuit à l'ambiance de travail. Un changement d'attitude est attendu."];
      p=pp[ri%pp.length];
    } else {
      var intro=["Ce trimestre, ","Il est à noter que ","Des progrès sont attendus : "];
      var remob=["Une remobilisation sérieuse est attendue.","Un effort régulier permettra de progresser.","Des efforts constants sont nécessaires."];
      p=intro[ri%intro.length]+buildNeg()+". "+remob[ri%remob.length];
    }
    if(hasProg&&prog.indexOf("potentiel")>=0) p+=" Le potentiel est là.";
  } else if(compneg){
    var cp=[Il+" doit revoir son attitude en cours. Des efforts de respect sont attendus.",
            "Le comportement de "+il+" est à améliorer. Une implication plus positive est souhaitée."];
    p=cp[ri%cp.length];
  } else if(hasProg){
    if(prog.indexOf("potentiel")>=0){
      p=Il+" dispose d'un réel potentiel à exploiter. Avec plus d'implication, les résultats seront au rendez-vous.";
    } else {
      var pi=["Ce trimestre, "+il+" affiche ","Les résultats témoignent de "];
      p=pi[ri%pi.length]+joinNoms(progNoms)+". Ces efforts méritent d'être soulignés.";
    }
  } else {
    p=Il+" participe aux activités. Des marges de progression existent.";
  }

  // Préfixe matière
  if(mat&&mat!=="EPS"){
    p="En "+mat+", "+p.charAt(0).toLowerCase()+p.slice(1);
  }

  // Mots libres
  if(ft.length){
    var ctx=ft.join(", ");
    var sports=["badminton","tennis","basket","football","handball","volley","athlétisme","natation","rugby","judo","escalade","demi-fond","ultimate","frisbee","acrosport","danse","boxe","lutte","cross","ping"];
    var profils=["ulis","segpa","dys","tdah","fragile","blessé","handicap","asthme","dispensé","inclusion","allophone"];
    var isSp=ft.some(function(m){return sports.some(function(s){return m.toLowerCase().indexOf(s)>=0;});});
    var isPr=ft.some(function(m){return profils.some(function(pr){return m.toLowerCase().indexOf(pr)>=0;});});
    if(isSp) p=p.replace(/\.$/,"")+", notamment en "+ctx+".";
    else if(isPr) p=p.replace(/\.$/,"")+" (profil "+ctx+" pris en compte).";
    else p=p.replace(/\.$/,"")+" — "+ctx+".";
  }

  return p;
}

function generer(){
  var keys=Object.keys(sel);
  var fv=document.getElementById("free").value;
  var ft=fv?fv.split(",").map(function(s){return s.trim();}).filter(Boolean):[];
  if(!keys.length&&!ft.length){alert("Sélectionne au moins un mot-clé.");return;}
  prenomCur=document.getElementById("prenom").value.trim();
  classeCur=document.getElementById("classe").value;
  matCur=document.getElementById("matiere").value;
  var f=genre==="F";
  var Il=prenomCur||(f?"Elle":"Il");
  var il=prenomCur||(f?"elle":"il");
  phrase=construire(keys,ft,f,Il,il,matCur,ri);
  document.getElementById("rz").style.display="block";
  document.getElementById("ok").style.display="none";
  document.getElementById("rl").textContent=prenomCur?"Phrase pour "+prenomCur:"Phrase générée";
  document.getElementById("rt").textContent=phrase;
}
function regenerer(){ri++;generer();}

function enregistrer(){
  if(!phrase)return;
  var d=db();
  d.push({id:Date.now(),prenom:prenomCur||"—",classe:classeCur,matiere:matCur,genre:genre,phrase:phrase,date:new Date().toLocaleDateString("fr-FR"),tri:trim(),an:annee()});
  dbS(d);badge();popAn();
  var b=document.getElementById("ok");b.style.display="block";setTimeout(function(){b.style.display="none";},2000);
}
function copierPhrase(){
  navigator.clipboard.writeText(phrase).catch(function(){var t=document.createElement("textarea");t.value=phrase;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);});
}
function resetForm(){
  sel={};ri=0;
  document.getElementById("prenom").value="";
  document.getElementById("free").value="";
  document.getElementById("rz").style.display="none";
  phrase="";renderAll();
}

// ── LISTE ────────────────────────────────────────────────────────────────────
function filtrer(f,btn){
  filtreCur=f;
  document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");renderListe();
}
function popAn(){
  var d=db();var ans=[];
  d.forEach(function(e){if(e.an&&ans.indexOf(e.an)<0)ans.push(e.an);});
  ans.sort().reverse();
  ["fa","ean"].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.innerHTML='<option value="t">Toutes années</option>'+ans.map(function(a){return '<option value="'+a+'">'+a+'</option>';}).join("");
  });
}
function renderListe(){
  var d=db();
  var fm=document.getElementById("fm").value;
  var ft=document.getElementById("ft").value;
  var fa=document.getElementById("fa").value;
  if(filtreCur!=="toutes") d=d.filter(function(e){return e.classe===filtreCur;});
  if(fm!=="t") d=d.filter(function(e){return e.matiere===fm;});
  if(ft!=="t") d=d.filter(function(e){return (e.tri||"T1")===ft;});
  if(fa!=="t") d=d.filter(function(e){return (e.an||"")===fa;});
  document.getElementById("cnt").textContent=d.length+" élève(s)";
  var el=document.getElementById("elist");
  if(!d.length){el.innerHTML='<div class="emp">Aucune appréciation enregistrée.</div>';return;}
  el.innerHTML=d.map(function(e){
    return '<div class="ei"><div class="ein"><div class="en">'+e.prenom+' <span style="font-weight:400;font-size:12px;color:var(--mut)">'+e.classe+'</span></div>'
      +'<div class="em">'+(e.tri||"")+" "+(e.an||"")+" · "+(e.matiere||"")+" · "+e.date+'</div>'
      +'<div class="ep">'+e.phrase+'</div></div>'
      +'<div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">'
      +'<button class="ib" onclick="cpItem('+e.id+')">⎘</button>'
      +'<button class="ib d" onclick="delItem('+e.id+')">🗑</button></div></div>';
  }).join("");
}
function cpItem(id){var e=db().filter(function(x){return x.id===id;})[0];if(e)navigator.clipboard.writeText(e.phrase).catch(function(){});}
function delItem(id){if(!confirm("Supprimer ?"))return;dbS(db().filter(function(x){return x.id!==id;}));badge();renderListe();renderExp();}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function renderExp(){
  var d=db();
  var ecl=document.getElementById("ecl").value;
  var emat=document.getElementById("emat").value;
  var etr=document.getElementById("etr").value;
  var ean=document.getElementById("ean").value;
  if(ecl!=="t") d=d.filter(function(e){return e.classe===ecl;});
  if(emat!=="t") d=d.filter(function(e){return e.matiere===emat;});
  if(etr!=="t") d=d.filter(function(e){return (e.tri||"T1")===etr;});
  if(ean!=="t") d=d.filter(function(e){return (e.an||"")===ean;});
  var el=document.getElementById("ecnt");
  if(!d.length){el.textContent="Aucune appréciation.";return;}
  el.textContent=d.map(function(e){
    return e.prenom+" ("+e.classe+(e.matiere?" · "+e.matiere:"")+(e.tri?" · "+e.tri:"")+(e.an?" "+e.an:"")+")\n"+e.phrase;
  }).join("\n\n");
}
function copierExp(){navigator.clipboard.writeText(document.getElementById("ecnt").textContent).catch(function(){});}

function badge(){var n=db().length;document.getElementById("bdg").textContent=n?"("+n+")":"";}

function setTab(id){
  document.querySelectorAll(".tab").forEach(function(t,i){t.classList.toggle("on",["gen","lst","exp"][i]===id);});
  document.querySelectorAll(".sec").forEach(function(s){s.classList.remove("on");});
  document.getElementById(id).classList.add("on");
  if(id==="lst"){popAn();renderListe();}
  if(id==="exp"){popAn();renderExp();}
}

// ── INIT ─────────────────────────────────────────────────────────────────────
onClasse();
badge();
</script>
