<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appréciations EPS</title>
<style>
:root{--vert:#1a7a6e;--vert-dark:#145f55;--orange:#e8671a;--orange-light:#fef0e6;--bg:#f0f2f0;--card:#fff;--border:#dde8e6;--text:#1a1a1a;--muted:#5a7570}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.header{background:var(--vert);padding:16px 16px 14px;margin-bottom:0}
.header h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:.01em}
.header h1 span{color:#f9c06a;margin-right:8px}
.body{padding:16px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:14px;cursor:pointer;color:var(--muted)}
.tab.active{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.section{display:none}.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.slabel{font-size:11px;font-weight:700;color:var(--vert);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.chip{padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted);user-select:none}
.chip.pos.on{background:#e6f4f1;color:var(--vert-dark);border-color:var(--vert)}
.chip.neg.on{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.chip.comp.on{background:var(--orange-light);color:#7a3a0a;border-color:var(--orange)}
.chip.prog.on{background:#e6f4f1;color:var(--vert-dark);border-color:var(--vert)}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px}
input[type=text],select{width:100%;font-size:14px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)}
input[type=text]:focus,select:focus{outline:none;border-color:var(--vert)}
.genre-row{display:flex;gap:8px}
.grb{padding:7px 16px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted)}
.grb.on{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
button.action{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--text)}
button.action:hover{background:#f0f7f6;border-color:var(--vert)}
button.action.primary{border-color:var(--orange);background:var(--orange);color:#fff;font-weight:600}
button.action.primary:hover{background:#d45e15}
.result-box{background:#f4faf9;border:1.5px solid var(--vert);border-radius:10px;padding:14px;margin-top:12px}
.result-text{font-size:14px;line-height:1.7;min-height:48px;white-space:pre-wrap;color:var(--text)}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
.stag{font-size:12px;padding:2px 8px;border-radius:99px;background:#e6f4f1;color:var(--vert-dark);border:1px solid var(--vert);display:inline-block}
.sel-tags{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 4px;min-height:22px}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.eleve-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.eleve-info{flex:1;min-width:0}
.eleve-nom{font-size:14px;font-weight:600;color:var(--vert-dark)}
.eleve-meta{font-size:12px;color:var(--muted);margin-top:2px}
.eleve-phrase{font-size:13px;line-height:1.6;margin-top:6px}
.icon-btn{padding:5px 10px;font-size:12px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--muted)}
.icon-btn:hover{background:#f0f7f6}
.icon-btn.danger:hover{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.empty{font-size:13px;color:var(--muted);font-style:italic;padding:12px 0}
.filter-btn{padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted)}
.filter-btn.on{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.counter{font-size:12px;color:var(--muted);margin-left:auto}
.ok-banner{background:#e6f4f1;color:var(--vert-dark);border:1px solid var(--vert);border-radius:8px;padding:8px 12px;font-size:13px;margin-top:10px;display:none}
.export-box{background:#f4faf9;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:13px;line-height:1.9;white-space:pre-wrap;min-height:60px;color:var(--text)}
@media(max-width:500px){.row3{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>📋 Appréciations EPS</h1>
<div class="tabs">
  <button class="tab active" onclick="setTab('gen')">✦ Générer</button>
  <button class="tab" onclick="setTab('liste')">👥 Élèves <span id="badge"></span></button>
  <button class="tab" onclick="setTab('export')">↗ Export</button>
</div>

<div id="gen" class="section active">
  <div class="card">
    <div class="row3">
      <div><label>Prénom</label><input type="text" id="prenom" placeholder="Ex: Lucas" /></div>
      <div><label>Classe</label>
        <select id="classe"><option>6e</option><option>5e</option><option>4e</option><option>3e</option></select>
      </div>
      <div><label>Genre</label>
        <div class="genre-row">
          <button class="grb on" id="gb-m" onclick="setG('M')">Garçon</button>
          <button class="grb" id="gb-f" onclick="setG('F')">Fille</button>
        </div>
      </div>
    </div>
    <div class="slabel">Points positifs</div><div class="chips" id="cp-pos"></div>
    <div class="slabel">Points à travailler</div><div class="chips" id="cp-neg"></div>
    <div class="slabel">Comportement</div><div class="chips" id="cp-comp"></div>
    <div class="slabel">Progression</div><div class="chips" id="cp-prog"></div>
    <hr>
    <div style="margin-bottom:12px">
      <label>Mots libres <span style="font-weight:400;color:#888">(séparés par virgules)</span></label>
      <input type="text" id="free" placeholder="Ex: badminton, manque de vitesse…" oninput="renderTags()" />
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:4px">Mots-clés sélectionnés :</div>
    <div class="sel-tags" id="sel-tags"><span style="font-size:12px;color:#aaa;font-style:italic">Aucun</span></div>
    <div class="btn-row">
      <button class="action primary" onclick="generer()">⚡ Générer</button>
      <button class="action" onclick="resetForm()">↺ Réinitialiser</button>
    </div>
    <div id="result-zone" style="display:none" class="result-box">
      <div style="font-size:12px;color:#888;margin-bottom:6px" id="rlabel">Phrase générée</div>
      <div id="rtext" class="result-text"></div>
      <div class="hint" id="rhint"></div>
      <div class="btn-row">
        <button class="action primary" onclick="enregistrer()">💾 Enregistrer</button>
        <button class="action" onclick="generer()">↺ Regénérer</button>
        <button class="action" onclick="copierPhrase()">⎘ Copier</button>
      </div>
      <div class="ok-banner" id="ok-banner">✓ Enregistré !</div>
    </div>
  </div>
</div>

<div id="liste" class="section">
  <div class="filter-row">
    <button class="filter-btn on" onclick="filtrer('toutes',this)">Toutes</button>
    <button class="filter-btn" onclick="filtrer('6e',this)">6e</button>
    <button class="filter-btn" onclick="filtrer('5e',this)">5e</button>
    <button class="filter-btn" onclick="filtrer('4e',this)">4e</button>
    <button class="filter-btn" onclick="filtrer('3e',this)">3e</button>
    <span class="counter" id="lcounter"></span>
  </div>
  <div id="elist"></div>
</div>

<div id="export" class="section">
  <div class="filter-row">
    <label style="font-size:13px;align-self:center;margin:0">Classe :</label>
    <select id="ecl" onchange="renderExport()" style="width:auto;font-size:13px;padding:6px 10px">
      <option value="toutes">Toutes</option>
      <option>6e</option><option>5e</option><option>4e</option><option>3e</option>
    </select>
    <button class="action" style="margin-left:auto" onclick="copierExport()">⎘ Copier tout</button>
  </div>
  <div id="econtent" class="export-box">Aucune appréciation.</div>
</div>

<script>
const CHIPS={
  pos:[
    {k:"investi",l:"investi(e)"},
    {k:"sérieux",l:"sérieux/sérieuse"},
    {k:"appliqué",l:"appliqué(e)"},
    {k:"participation",l:"participation active"},
    {k:"equipe",l:"esprit d'équipe"},
    {k:"fairplay",l:"fair-play"},
    {k:"ecoute",l:"écoute des consignes"},
    {k:"leadership",l:"leadership"},
    {k:"technique",l:"bon niveau technique"},
    {k:"autonome",l:"autonomie"}
  ],
  neg:[
    {k:"investissement",l:"manque d'investissement"},
    {k:"bavardage",l:"bavardage"},
    {k:"concentration",l:"manque de concentration"},
    {k:"difficultes",l:"difficultés techniques"},
    {k:"retrait",l:"en retrait"},
    {k:"irregulier",l:"irrégulier(e)"},
    {k:"efforts",l:"efforts à fournir"},
    {k:"perturbateur",l:"perturbateur/trice"}
  ],
  comp:[
    {k:"attitude",l:"attitude positive"},
    {k:"respectueux",l:"respectueux/euse"},
    {k:"agreable",l:"agréable en cours"},
    {k:"comportement",l:"comportement à améliorer"},
    {k:"ponctuel",l:"ponctuel(le)"}
  ],
  prog:[
    {k:"progres",l:"en progrès"},
    {k:"progression",l:"progression constante"},
    {k:"potentiel",l:"potentiel à exploiter"},
    {k:"encourageant",l:"résultats encourageants"},
    {k:"hausse",l:"trimestre en hausse"},
    {k:"acquis",l:"acquis solides"}
  ]
};

// Phrases complètes par profil — chaque entrée est une phrase prête à l'emploi
// Variables : {il} {elle} {Il} {Elle} {son} {sa} {e} {ue}
const PHRASES = {
  // Très positif
  pos_fort: [
    "Élève très {investi_e}, {il} fait preuve d'un excellent {esprit_equipe} et d'une {ecoute} exemplaire. Félicitations pour ce trimestre.",
    "Très bonne participation, {il} s'implique avec sérieux et montre un {leadership} naturel apprécié. Continuez ainsi.",
    "Élève {applique_e} et {autonome}, {il} progresse régulièrement et constitue un atout pour le groupe.",
    "Bon trimestre. {Il} s'investit pleinement, fait preuve de {fairplay} et d'une belle motivation. Bravo.",
    "{Il} se distingue par {son} sérieux, {son} écoute et {son} implication constante. Excellent travail.",
  ],
  // Positif avec progression
  pos_prog: [
    "Élève sérieux{e} et {investi_e} qui affiche une {progression} régulière. Les efforts payent, continuons dans cette dynamique.",
    "Bon trimestre en progression. {Il} s'implique avec sérieux et les résultats sont {encourageants}. Bravo.",
    "{Il} est {investi_e} et motivé{e} ; la {progression} constatée ce trimestre est encourageante. À poursuivre.",
    "Les acquis se consolident grâce à un travail sérieux et régulier. Trimestre positif et {encourageant}.",
  ],
  // Positif avec points à améliorer
  pos_neg_bavardage: [
    "Élève {investi_e} qui possède de réelles qualités, mais dont le {bavardage} nuit parfois au bon déroulement des séances. Des efforts sont attendus sur ce point.",
    "{Il} fait preuve de {participation} et d'implication, cependant le {bavardage} reste un frein à sa concentration. À corriger.",
  ],
  pos_neg_concentration: [
    "Des qualités certaines, mais le {manque_concentration} empêche {il} de donner le meilleur de {lui_elle_meme}. Un effort de rigueur est attendu.",
    "Élève {investi_e} mais qui manque parfois de concentration. Avec plus de régularité, les résultats seront au rendez-vous.",
  ],
  pos_neg_investissement: [
    "{Il} dispose de bonnes capacités mais l'investissement en séance reste insuffisant. {Il} doit se remobiliser pour progresser.",
    "Du potentiel, mais un {manque_investissement} qui pénalise les résultats. Des efforts supplémentaires sont nécessaires.",
  ],
  pos_neg_retrait: [
    "Élève discret{e} qui possède des qualités mais reste trop {en_retrait} lors des activités. Une plus grande implication est attendue.",
    "{Il} doit prendre davantage de place dans les activités collectives. {Son} attitude réservée freine sa progression.",
  ],
  // Négatif dominant
  neg_bavardage: [
    "Le {bavardage} répété perturbe le bon déroulement des séances et nuit à la concentration de la classe. Un effort sérieux est indispensable.",
    "{Il} doit impérativement réduire les bavardages en cours d'EPS, ce comportement freine sa progression et celle du groupe.",
  ],
  neg_investissement: [
    "L'investissement en séance est insuffisant. {Il} doit se remobiliser et fournir davantage d'efforts pour progresser.",
    "Des difficultés persistantes liées à un manque d'implication. Une véritable remobilisation est nécessaire ce trimestre.",
  ],
  neg_concentration: [
    "{Il} manque de concentration en cours, ce qui impacte directement ses résultats. Des efforts de régularité sont attendus.",
    "Des lacunes dues à un manque de concentration récurrent. {Il} doit apprendre à mieux se focaliser sur les objectifs des séances.",
  ],
  neg_perturbateur: [
    "Le comportement perturbateur de {il} nuit au bon déroulement des cours. Une attitude plus respectueuse est indispensable.",
    "{Il} perturbe régulièrement les séances. Ce comportement est inacceptable et doit changer rapidement.",
  ],
  neg_irregulier: [
    "Des résultats irréguliers qui ne reflètent pas le potentiel réel de {il}. Plus de régularité dans l'effort est attendu.",
    "L'irrégularité dans l'implication pénalise les résultats. {Il} doit s'investir de façon plus constante.",
  ],
  neg_difficultes: [
    "{Il} rencontre des difficultés techniques persistantes. Un travail plus régulier et une meilleure écoute des consignes permettraient de progresser.",
    "Des difficultés techniques à surmonter. {Il} doit persévérer et s'appuyer davantage sur les conseils dispensés en cours.",
  ],
  // Comportement positif
  comp_positif: [
    "{Il} fait preuve d'une attitude exemplaire en cours d'EPS : respectueux{se}, ponctuel{le} et toujours de bonne volonté.",
    "Comportement très satisfaisant. {Il} est {agreable} et contribue positivement à l'ambiance de la classe.",
    "Élève {respectueux_se} et {ponctuele} dont l'attitude positive est appréciée. Bon trimestre.",
  ],
  // Comportement à améliorer
  comp_ameliorer: [
    "Le comportement de {il} est à revoir : des efforts de respect et d'implication sont indispensables pour progresser.",
    "{Il} doit travailler sur {son} comportement en cours, qui reste en-deçà de ce qui est attendu à ce niveau.",
  ],
  // Progression seule
  prog_seul: [
    "Trimestre en progression. {Il} fait des efforts qui commencent à porter leurs fruits. Continuons dans cette direction.",
    "{Il} progresse à {son} rythme et les résultats s'améliorent. Ces efforts méritent d'être soulignés.",
    "Des acquis solides qui témoignent d'un travail régulier. {Il} est sur la bonne voie.",
    "Trimestre en hausse, les progrès sont visibles. {Il} doit maintenir cet effort pour consolider ses acquis.",
  ],
  // Potentiel non exploité
  potentiel: [
    "{Il} dispose d'un réel potentiel qui reste à exploiter. Avec plus d'implication, les résultats pourraient être bien meilleurs.",
    "Du potentiel, mais des efforts insuffisants. {Il} doit se donner les moyens de progresser.",
  ],
  // Par défaut
  defaut: [
    "Trimestre correct. {Il} participe aux activités et s'implique de façon globalement satisfaisante.",
    "Élève qui s'investit dans les activités proposées. Des marges de progression existent.",
    "Participation correcte aux activités. {Il} doit poursuivre ses efforts pour progresser.",
  ]
};

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function appliquer(phrase, g){
  const f = g==="F";
  return phrase
    .replace(/\{il\}/g, f?"elle":"il")
    .replace(/\{Il\}/g, f?"Elle":"Il")
    .replace(/\{son\}/g, f?"sa":"son")
    .replace(/\{Son\}/g, f?"Sa":"Son")
    .replace(/\{lui_elle_meme\}/g, f?"elle-même":"lui-même")
    .replace(/\{e\}/g, f?"e":"")
    .replace(/\{ue\}/g, f?"ue":"u")
    .replace(/\{investi_e\}/g, f?"investie":"investi")
    .replace(/\{applique_e\}/g, f?"appliquée":"appliqué")
    .replace(/\{autonome\}/g, "autonome")
    .replace(/\{respectueux_se\}/g, f?"respectueuse":"respectueux")
    .replace(/\{ponctuele\}/g, f?"ponctuelle":"ponctuel")
    .replace(/\{agreable\}/g, "agréable")
    .replace(/\{esprit_equipe\}/g, "esprit d'équipe")
    .replace(/\{ecoute\}/g, "écoute")
    .replace(/\{fairplay\}/g, "fair-play")
    .replace(/\{leadership\}/g, "leadership")
    .replace(/\{participation\}/g, "participation active")
    .replace(/\{bavardage\}/g, "bavardage")
    .replace(/\{manque_concentration\}/g, "manque de concentration")
    .replace(/\{manque_investissement\}/g, "manque d'investissement")
    .replace(/\{en_retrait\}/g, "en retrait")
    .replace(/\{progression\}/g, "progression")
    .replace(/\{encourageant\}/g, f?"encourageante":"encourageant")
    .replace(/\{encourageants\}/g, "encourageants");
}

function choisirPhrases(sel, genre, libre){
  const pos = Object.entries(sel).filter(([k,v])=>v==="pos").map(([k])=>k);
  const neg = Object.entries(sel).filter(([k,v])=>v==="neg").map(([k])=>k);
  const comp = Object.entries(sel).filter(([k,v])=>v==="comp").map(([k])=>k);
  const prog = Object.entries(sel).filter(([k,v])=>v==="prog").map(([k])=>k);

  const hasPos = pos.length>0, hasNeg = neg.length>0;
  const hasComp = comp.length>0, hasProg = prog.length>0;

  let candidats = [];

  // Profil très positif (3+ positifs ou leadership/technique)
  if(hasPos && !hasNeg && (pos.length>=2 || pos.includes("leadership") || pos.includes("technique"))){
    candidats = hasProg ? PHRASES.pos_prog : PHRASES.pos_fort;
  }
  // Positif + progression
  else if(hasPos && hasProg && !hasNeg){
    candidats = PHRASES.pos_prog;
  }
  // Positif + bavardage
  else if(hasPos && neg.includes("bavardage")){
    candidats = PHRASES.pos_neg_bavardage;
  }
  // Positif + manque de concentration
  else if(hasPos && neg.includes("concentration")){
    candidats = PHRASES.pos_neg_concentration;
  }
  // Positif + manque investissement
  else if(hasPos && neg.includes("investissement")){
    candidats = PHRASES.pos_neg_investissement;
  }
  // Positif + en retrait
  else if(hasPos && neg.includes("retrait")){
    candidats = PHRASES.pos_neg_retrait;
  }
  // Négatif dominant — bavardage
  else if(!hasPos && neg.includes("bavardage")){
    candidats = PHRASES.neg_bavardage;
  }
  // Négatif dominant — perturbateur
  else if(!hasPos && neg.includes("perturbateur")){
    candidats = PHRASES.neg_perturbateur;
  }
  // Négatif dominant — investissement
  else if(!hasPos && neg.includes("investissement")){
    candidats = PHRASES.neg_investissement;
  }
  // Négatif dominant — concentration
  else if(!hasPos && neg.includes("concentration")){
    candidats = PHRASES.neg_concentration;
  }
  // Négatif dominant — irrégulier
  else if(!hasPos && neg.includes("irregulier")){
    candidats = PHRASES.neg_irregulier;
  }
  // Négatif dominant — difficultés
  else if(!hasPos && neg.includes("difficultes")){
    candidats = PHRASES.neg_difficultes;
  }
  // Comportement positif
  else if(hasComp && comp.includes("attitude") || comp.includes("respectueux") || comp.includes("agreable")){
    candidats = hasPos ? PHRASES.pos_fort : PHRASES.comp_positif;
  }
  // Comportement à améliorer
  else if(hasComp && comp.includes("comportement")){
    candidats = PHRASES.comp_ameliorer;
  }
  // Potentiel à exploiter
  else if(prog.includes("potentiel") && !hasPos){
    candidats = PHRASES.potentiel;
  }
  // Progression seule
  else if(hasProg && !hasNeg){
    candidats = PHRASES.prog_seul;
  }
  // Défaut
  else {
    candidats = PHRASES.defaut;
  }

  let phrase = appliquer(pick(candidats), genre);

  // Intégrer les mots libres naturellement en fin de phrase
  if(libre.length){
    const ctx = libre.join(", ");
    // Détecter si c'est un sport/activité ou une remarque
    const sports = ["badminton","tennis","basket","football","handball","volley","athlétisme","natation","gymnastique","rugby","judo","escalade","course","sprint","relais","demi-fond","ultimate","frisbee","acrosport","danse","boxe","lutte","musculation","vélo","cross"];
    const profils = ["ulis","segpa","dys","tdah","fragile","blessé","handicap","asthme","dispensé","inclus","inclusion","phobie","anxieux","anxieuse"];
    const isSport = libre.some(m => sports.some(s => m.toLowerCase().includes(s)));
    const isProfil = libre.some(m => profils.some(p => m.toLowerCase().includes(p)));

    if(isSport){
      phrase = phrase.replace(/\.$/, "") + `, notamment en ${ctx}.`;
    } else if(isProfil){
      phrase = phrase.replace(/\.$/, "") + ` Profil particulier à prendre en compte : ${ctx}.`;
    } else {
      // Contexte générique — s'intègre en fin de phrase
      phrase = phrase.replace(/\.$/, "") + `. ${ctx.charAt(0).toUpperCase() + ctx.slice(1)}.`;
    }
  }

  return phrase;
}

const KEY_DB="eps_appr_v1";
let genre="M", sel={}, filtreCur="toutes", phrase="", prenomCur="", classeCur="";

function dbLoad(){try{return JSON.parse(localStorage.getItem(KEY_DB)||"[]");}catch(e){return[];}}
function dbSave(d){localStorage.setItem(KEY_DB,JSON.stringify(d));}

function setG(g){
  genre=g;
  document.getElementById("gb-m").classList.toggle("on",g==="M");
  document.getElementById("gb-f").classList.toggle("on",g==="F");
}

function renderChips(){
  ["pos","neg","comp","prog"].forEach(cat=>{
    document.getElementById("cp-"+cat).innerHTML=CHIPS[cat].map(c=>
      `<button class="chip ${cat} ${sel[c.k]?"on":""}" onclick="tog('${c.k}','${cat}')">${c.l}</button>`
    ).join("");
  });
  renderTags();
}

function tog(k,cat){if(sel[k])delete sel[k];else sel[k]=cat;renderChips();}

function renderTags(){
  const keys=Object.keys(sel);
  const ft=document.getElementById("free").value.split(",").map(s=>s.trim()).filter(Boolean);
  const all=[...keys,...ft];
  document.getElementById("sel-tags").innerHTML=all.length
    ?all.map(k=>`<span class="stag">${CHIPS.pos.concat(CHIPS.neg,CHIPS.comp,CHIPS.prog).find(c=>c.k===k)?.l||k}</span>`).join("")
    :'<span style="font-size:12px;color:#aaa;font-style:italic">Aucun</span>';
}

function generer(){
  const keys=Object.keys(sel);
  const ft=document.getElementById("free").value.split(",").map(s=>s.trim()).filter(Boolean);
  if(!keys.length && !ft.length){alert("Sélectionne au moins un mot-clé.");return;}

  prenomCur=document.getElementById("prenom").value.trim();
  classeCur=document.getElementById("classe").value;
  phrase=choisirPhrases(sel, genre, ft);

  document.getElementById("result-zone").style.display="block";
  document.getElementById("ok-banner").style.display="none";
  document.getElementById("rlabel").textContent=prenomCur?`Phrase pour ${prenomCur}`:"Phrase générée";
  document.getElementById("rtext").textContent=phrase;
  document.getElementById("rhint").textContent="Clique sur Enregistrer pour sauvegarder, ou Regénérer pour varier.";
}

function enregistrer(){
  if(!phrase)return;
  const db=dbLoad();
  db.push({id:Date.now(),prenom:prenomCur||"—",classe:classeCur,genre,phrase,date:new Date().toLocaleDateString("fr-FR")});
  dbSave(db);updateBadge();
  const b=document.getElementById("ok-banner");
  b.style.display="block";setTimeout(()=>b.style.display="none",2000);
}

function copierPhrase(){
  navigator.clipboard.writeText(phrase).catch(()=>{
    const ta=document.createElement("textarea");ta.value=phrase;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
  });
}

function resetForm(){
  sel={};
  document.getElementById("prenom").value="";
  document.getElementById("free").value="";
  document.getElementById("result-zone").style.display="none";
  phrase="";renderChips();
}

function filtrer(f,btn){
  filtreCur=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");renderListe();
}

function renderListe(){
  const db=dbLoad();
  const filtered=filtreCur==="toutes"?db:db.filter(e=>e.classe===filtreCur);
  document.getElementById("lcounter").textContent=`${filtered.length} élève(s)`;
  const el=document.getElementById("elist");
  if(!filtered.length){el.innerHTML='<div class="empty">Aucune appréciation enregistrée.</div>';return;}
  el.innerHTML=filtered.map(e=>`
    <div class="eleve-item">
      <div class="eleve-info">
        <div class="eleve-nom">${e.prenom} <span style="font-weight:400;font-size:13px;color:#888">${e.classe}</span></div>
        <div class="eleve-meta">${e.date}</div>
        <div class="eleve-phrase">${e.phrase}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        <button class="icon-btn" onclick="cpItem(${e.id})">⎘</button>
        <button class="icon-btn danger" onclick="delItem(${e.id})">🗑</button>
      </div>
    </div>`).join("");
}

function cpItem(id){const e=dbLoad().find(x=>x.id===id);if(e)navigator.clipboard.writeText(e.phrase).catch(()=>{});}

function delItem(id){
  if(!confirm("Supprimer ?"))return;
  dbSave(dbLoad().filter(x=>x.id!==id));
  updateBadge();renderListe();renderExport();
}

function renderExport(){
  const f=document.getElementById("ecl").value;
  const db=dbLoad();
  const filtered=f==="toutes"?db:db.filter(e=>e.classe===f);
  document.getElementById("econtent").textContent=filtered.length
    ?filtered.map(e=>`${e.prenom} (${e.classe})\n${e.phrase}`).join("\n\n")
    :"Aucune appréciation.";
}

function copierExport(){navigator.clipboard.writeText(document.getElementById("econtent").textContent).catch(()=>{});}

function updateBadge(){
  const n=dbLoad().length;
  document.getElementById("badge").textContent=n?`(${n})`:"";
}

function setTab(id){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["gen","liste","export"][i]===id));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="liste")renderListe();
  if(id==="export")renderExport();
}

renderChips();
updateBadge();
</script>
</div></body>
</html>
