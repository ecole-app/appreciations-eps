<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appréciations Collège Luqman</title>
<style>
:root{--vert:#1a7a6e;--vert-dark:#145f55;--orange:#e8671a;--bg:#f0f2f0;--card:#fff;--border:#dde8e6;--text:#1a1a1a;--muted:#5a7570}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.header{background:var(--vert);padding:14px 16px}
.header h1{font-size:19px;font-weight:700;color:#fff}
.body{padding:14px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:14px;cursor:pointer;color:var(--muted);flex:1;text-align:center}
.tab.active{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.section{display:none}.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.slabel{font-size:11px;font-weight:700;color:var(--vert);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 7px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px}
.chip{padding:5px 11px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted);user-select:none;display:inline-block}
.chip.gen.on{background:#e6f4f1;color:var(--vert-dark);border-color:var(--vert)}
.chip.pos.on{background:#e6f4f1;color:var(--vert-dark);border-color:var(--vert)}
.chip.neg.on{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.chip.comp.on{background:#fef0e6;color:#7a3a0a;border-color:var(--orange)}
.chip.prog.on{background:#e6f4f1;color:var(--vert-dark);border-color:var(--vert)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
input,select{width:100%;font-size:14px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)}
input:focus,select:focus{outline:none;border-color:var(--vert)}
.genre-row{display:flex;gap:8px}
.grb{padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted)}
.grb.on{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
button.act{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--text)}
button.act:hover{background:#f0f7f6}
button.act.primary{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600}
button.act.primary:hover{background:#d45e15}
.result-box{background:#f4faf9;border:1.5px solid var(--vert);border-radius:10px;padding:13px;margin-top:10px}
.result-text{font-size:14px;line-height:1.75;min-height:44px;white-space:pre-wrap}
.hint{font-size:12px;color:var(--muted);margin-top:5px}
.stag{font-size:12px;padding:2px 8px;border-radius:99px;background:#e6f4f1;color:var(--vert-dark);border:1px solid var(--vert);display:inline-block;margin:2px}
.sel-tags{display:flex;flex-wrap:wrap;margin:6px 0 2px;min-height:20px}
hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.eleve-item{display:flex;align-items:flex-start;gap:8px;padding:10px 11px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.eleve-info{flex:1;min-width:0}
.eleve-nom{font-size:14px;font-weight:600;color:var(--vert-dark)}
.eleve-meta{font-size:12px;color:var(--muted);margin-top:2px}
.eleve-phrase{font-size:13px;line-height:1.55;margin-top:5px}
.ibtn{padding:5px 9px;font-size:12px;border-radius:7px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--muted)}
.ibtn:hover{background:#f0f7f6}
.ibtn.danger:hover{background:#FCEBEB;color:#A32D2D}
.empty{font-size:13px;color:var(--muted);font-style:italic;padding:10px 0}
.fbtn{padding:5px 11px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted)}
.fbtn.on{background:var(--vert);color:#fff;border-color:var(--vert);font-weight:600}
.frow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.fsel{font-size:13px;padding:5px 8px;border:1px solid #ccc;border-radius:8px;background:#fff;width:auto}
.counter{font-size:12px;color:var(--muted);margin-left:auto}
.ok{background:#e6f4f1;color:var(--vert-dark);border:1px solid var(--vert);border-radius:8px;padding:8px 11px;font-size:13px;margin-top:9px;display:none}
.ebox{background:#f4faf9;border:1px solid var(--border);border-radius:10px;padding:11px;font-size:13px;line-height:1.85;white-space:pre-wrap;min-height:50px}
@media(max-width:400px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header"><h1>📋 Appréciations Collège Luqman</h1></div>
<div class="body">

<div class="tabs">
  <button class="tab active" onclick="setTab('gen')">✦ Générer</button>
  <button class="tab" onclick="setTab('liste')">👥 Élèves <span id="badge"></span></button>
  <button class="tab" onclick="setTab('export')">↗ Export</button>
</div>

<!-- GÉNÉRER -->
<div id="gen" class="section active">
<div class="card">
  <div class="grid2">
    <div><label>Prénom</label><input type="text" id="prenom" placeholder="Ex: Lucas"></div>
    <div><label>Classe</label><select id="classe" onchange="updateMatieres()"><option>6e</option><option>5e</option><option>4e</option><option>3e</option></select></div>
  </div>
  <div class="grid2">
    <div><label>Matière</label><select id="matiere"></select></div>
    <div><label>Genre</label><div class="genre-row"><button class="grb on" id="gb-m" onclick="setG('M')">Garçon</button><button class="grb" id="gb-f" onclick="setG('F')">Fille</button></div></div>
  </div>

  <div class="slabel">Général — toutes matières</div>
  <div class="chips" id="cp-gen"></div>
  <div class="slabel">Points positifs EPS</div>
  <div class="chips" id="cp-pos"></div>
  <div class="slabel">Points à travailler</div>
  <div class="chips" id="cp-neg"></div>
  <div class="slabel">Comportement</div>
  <div class="chips" id="cp-comp"></div>
  <div class="slabel">Progression</div>
  <div class="chips" id="cp-prog"></div>

  <hr>
  <div style="margin-bottom:10px">
    <label>Mots libres <span style="font-weight:400;color:var(--muted)">(sport, contexte… séparés par virgules)</span></label>
    <input type="text" id="free" placeholder="Ex: badminton, ULIS…" oninput="renderTags()">
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:3px">Mots-clés sélectionnés :</div>
  <div class="sel-tags" id="sel-tags"><span style="font-size:12px;color:#aaa;font-style:italic">Aucun</span></div>

  <div class="btn-row">
    <button class="act primary" onclick="generer()">⚡ Générer</button>
    <button class="act" onclick="resetForm()">↺ Réinitialiser</button>
  </div>

  <div id="result-zone" style="display:none" class="result-box">
    <div style="font-size:12px;color:var(--muted);margin-bottom:5px" id="rlabel">Phrase générée</div>
    <div id="rtext" class="result-text"></div>
    <div class="hint" id="rhint"></div>
    <div class="btn-row">
      <button class="act primary" onclick="enregistrer()">💾 Enregistrer</button>
      <button class="act" onclick="generer()">↺ Regénérer</button>
      <button class="act" onclick="copierPhrase()">⎘ Copier</button>
    </div>
    <div class="ok" id="ok-banner">✓ Enregistré !</div>
  </div>
</div>
</div>

<!-- ÉLÈVES -->
<div id="liste" class="section">
  <div class="frow">
    <button class="fbtn on" onclick="filtrer('toutes',this)">Toutes</button>
    <button class="fbtn" onclick="filtrer('6e',this)">6e</button>
    <button class="fbtn" onclick="filtrer('5e',this)">5e</button>
    <button class="fbtn" onclick="filtrer('4e',this)">4e</button>
    <button class="fbtn" onclick="filtrer('3e',this)">3e</button>
    <span class="counter" id="lcounter"></span>
  </div>
  <div class="frow">
    <select class="fsel" id="filtre-matiere" onchange="renderListe()">
      <option value="toutes">Toutes matières</option>
      <option>Français</option><option>Maths</option><option>Anglais</option><option>Arabe</option>
      <option>Espagnol</option><option>Histoire-Géo/EMC</option><option>SVT</option>
      <option>Physique-Chimie</option><option>Technologie</option>
      <option>Arts Plastiques</option><option>Éducation Musicale</option><option>EPS</option>
    </select>
    <select class="fsel" id="filtre-trim" onchange="renderListe()">
      <option value="tous">Tous trimestres</option>
      <option value="T1">T1 (sept–déc)</option>
      <option value="T2">T2 (jan–mars)</option>
      <option value="T3">T3 (avr–juin)</option>
    </select>
    <select class="fsel" id="filtre-annee" onchange="renderListe()">
      <option value="toutes">Toutes années</option>
    </select>
  </div>
  <div id="elist"></div>
</div>

<!-- EXPORT -->
<div id="export" class="section">
  <div class="frow">
    <select class="fsel" id="ecl" onchange="renderExport()">
      <option value="toutes">Toutes classes</option><option>6e</option><option>5e</option><option>4e</option><option>3e</option>
    </select>
    <select class="fsel" id="ecl-mat" onchange="renderExport()">
      <option value="toutes">Toutes matières</option>
      <option>Français</option><option>Maths</option><option>Anglais</option><option>Arabe</option>
      <option>Espagnol</option><option>Histoire-Géo/EMC</option><option>SVT</option>
      <option>Physique-Chimie</option><option>Technologie</option>
      <option>Arts Plastiques</option><option>Éducation Musicale</option><option>EPS</option>
    </select>
    <select class="fsel" id="ecl-trim" onchange="renderExport()">
      <option value="tous">Tous trimestres</option>
      <option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option>
    </select>
    <select class="fsel" id="ecl-annee" onchange="renderExport()">
      <option value="toutes">Toutes années</option>
    </select>
    <button class="act" style="margin-left:auto" onclick="copierExport()">⎘ Copier</button>
  </div>
  <div id="econtent" class="ebox">Aucune appréciation.</div>
</div>

</div>

<script>
var M6=["Français","Maths","Anglais","Arabe","Histoire-Géo/EMC","SVT","Physique-Chimie","Arts Plastiques","Éducation Musicale","EPS"];
var M5=["Français","Maths","Anglais","Arabe","Espagnol","Histoire-Géo/EMC","SVT","Physique-Chimie","Technologie","Arts Plastiques","Éducation Musicale","EPS"];

var CHIPS={
  gen:[
    {k:"curieux",l:"curiosité intellectuelle"},{k:"rigoureux",l:"rigueur"},
    {k:"oral",l:"participation à l'oral"},{k:"ecrit",l:"travail écrit soigné"},
    {k:"methode",l:"bonne méthode"},{k:"efforts_gen",l:"efforts constants"},
    {k:"autonomie_gen",l:"autonomie"},{k:"respect_gen",l:"respect des consignes"},
    {k:"entraide",l:"entraide"},{k:"creativite",l:"créativité"},
    {k:"perseverance",l:"persévérance"},{k:"assidu",l:"assiduité"},
    {k:"esprit_critique",l:"esprit critique"}
  ],
  pos:[
    {k:"investi",l:"investi(e)"},{k:"serieux",l:"sérieux/sérieuse"},
    {k:"applique",l:"appliqué(e)"},{k:"participation",l:"participation active"},
    {k:"equipe",l:"esprit d'équipe"},{k:"fairplay",l:"fair-play"},
    {k:"ecoute",l:"écoute des consignes"},{k:"leadership",l:"leadership"},
    {k:"technique",l:"bon niveau technique"},{k:"autonome",l:"autonomie"}
  ],
  neg:[
    {k:"investissement",l:"manque d'investissement"},{k:"bavardage",l:"bavardage"},
    {k:"concentration",l:"manque de concentration"},{k:"difficultes",l:"difficultés techniques"},
    {k:"retrait",l:"en retrait"},{k:"irregulier",l:"irrégulier(e)"},
    {k:"efforts",l:"efforts à fournir"},{k:"perturbateur",l:"perturbateur/trice"}
  ],
  comp:[
    {k:"attitude",l:"attitude positive"},{k:"respectueux",l:"respectueux/euse"},
    {k:"agreable",l:"agréable en cours"},{k:"comportement",l:"comportement à améliorer"},
    {k:"ponctuel",l:"ponctuel(le)"}
  ],
  prog:[
    {k:"progres",l:"en progrès"},{k:"progression",l:"progression constante"},
    {k:"potentiel",l:"potentiel à exploiter"},{k:"encourageant",l:"résultats encourageants"},
    {k:"hausse",l:"trimestre en hausse"},{k:"acquis",l:"acquis solides"}
  ]
};

var KEY="eps_v2";
var genre="M", sel={}, filtreCur="toutes", phrase="", prenomCur="", classeCur="", matiereCur="";

function dbLoad(){try{return JSON.parse(localStorage.getItem(KEY)||"[]");}catch(e){return[];}}
function dbSave(d){localStorage.setItem(KEY,JSON.stringify(d));}

function getTrimAuto(){
  var m=new Date().getMonth()+1;
  if(m>=9) return "T1";
  if(m<=3) return "T2";
  return "T3";
}
function getAnnee(){
  var now=new Date(), m=now.getMonth()+1, y=now.getFullYear();
  return m>=9 ? y+"-"+(y+1) : (y-1)+"-"+y;
}

function updateMatieres(){
  var cl=document.getElementById("classe").value;
  var liste=cl==="6e"?M6:M5;
  document.getElementById("matiere").innerHTML=liste.map(function(m){return "<option>"+m+"</option>";}).join("");
}

function setG(g){
  genre=g;
  document.getElementById("gb-m").classList.toggle("on",g==="M");
  document.getElementById("gb-f").classList.toggle("on",g==="F");
}

function allChips(){
  var r=[];
  Object.keys(CHIPS).forEach(function(c){r=r.concat(CHIPS[c]);});
  return r;
}

function renderChips(){
  Object.keys(CHIPS).forEach(function(cat){
    var el=document.getElementById("cp-"+cat);
    if(!el) return;
    el.innerHTML=CHIPS[cat].map(function(c){
      return '<button class="chip '+cat+' '+(sel[c.k]?"on":"")+'" onclick="tog(\''+c.k+'\',\''+cat+'\')">'+c.l+'</button>';
    }).join("");
  });
  renderTags();
}

function tog(k,cat){
  if(sel[k]) delete sel[k]; else sel[k]=cat;
  renderChips();
}

function renderTags(){
  var keys=Object.keys(sel);
  var fv=document.getElementById("free").value;
  var ft=fv?fv.split(",").map(function(s){return s.trim();}).filter(Boolean):[];
  var all=keys.concat(ft);
  var el=document.getElementById("sel-tags");
  if(!all.length){el.innerHTML='<span style="font-size:12px;color:#aaa;font-style:italic">Aucun</span>';return;}
  el.innerHTML=all.map(function(k){
    var found=allChips().filter(function(c){return c.k===k;})[0];
    return '<span class="stag">'+(found?found.l:k)+'</span>';
  }).join("");
}

function joinList(arr){
  if(!arr.length) return "";
  if(arr.length===1) return arr[0];
  return arr.slice(0,-1).join(", ")+" et "+arr[arr.length-1];
}

function generer(){
  var keys=Object.keys(sel);
  var fv=document.getElementById("free").value;
  var ft=fv?fv.split(",").map(function(s){return s.trim();}).filter(Boolean):[];
  if(!keys.length&&!ft.length){alert("Sélectionne au moins un mot-clé.");return;}

  prenomCur=document.getElementById("prenom").value.trim();
  classeCur=document.getElementById("classe").value;
  matiereCur=document.getElementById("matiere").value;

  var f=genre==="F";
  var Il=prenomCur||(f?"Elle":"Il");
  var il=prenomCur||(f?"elle":"il");

  var gen=keys.filter(function(k){return sel[k]==="gen";});
  var pos=keys.filter(function(k){return sel[k]==="pos";});
  var neg=keys.filter(function(k){return sel[k]==="neg";});
  var comp=keys.filter(function(k){return sel[k]==="comp";});
  var prog=keys.filter(function(k){return sel[k]==="prog";});

  var T_ADJ_POS={"investi":f?"investie":"investi","serieux":f?"sérieuse":"sérieux","applique":f?"appliquée":"appliqué","autonome":"autonome","fairplay":"fair-play"};
  var T_NOM_POS={"participation":"une participation active","equipe":"un esprit d'équipe","ecoute":"une bonne écoute","leadership":"un vrai leadership","technique":"un bon niveau technique"};
  var T_GEN={"curieux":"une curiosité intellectuelle","rigoureux":"de la rigueur","oral":"une bonne participation à l'oral","ecrit":"un travail écrit soigné","methode":"une bonne méthode de travail","efforts_gen":"des efforts constants","autonomie_gen":"de l'autonomie","respect_gen":"le respect des consignes","entraide":"un sens de l'entraide","creativite":"de la créativité","perseverance":"de la persévérance","assidu":"de l'assiduité","esprit_critique":"un esprit critique"};
  var T_NEG={"investissement":"manque d'investissement","bavardage":"bavardage","concentration":"manque de concentration","difficultes":"difficultés techniques","retrait":"tendance à rester en retrait","irregulier":"irrégularité dans l'effort","efforts":"efforts insuffisants","perturbateur":"comportement perturbateur"};
  var T_COMP_ADJ={"respectueux":f?"respectueuse":"respectueux","agreable":"agréable","ponctuel":f?"ponctuelle":"ponctuel"};
  var T_COMP_NOM={"attitude":"une attitude positive"};
  var T_PROG={"progres":"en progrès","progression":"une progression constante","potentiel":"un potentiel à exploiter","encourageant":"des résultats encourageants","hausse":"un trimestre en hausse","acquis":"des acquis solides"};

  var adjPos=pos.filter(function(k){return T_ADJ_POS[k];}).map(function(k){return T_ADJ_POS[k];});
  var nomPos=pos.filter(function(k){return T_NOM_POS[k];}).map(function(k){return T_NOM_POS[k];});
  var nomGen=gen.map(function(k){return T_GEN[k]||k;});
  var adjComp=comp.filter(function(k){return T_COMP_ADJ[k];}).map(function(k){return T_COMP_ADJ[k];});
  var nomComp=comp.filter(function(k){return T_COMP_NOM[k];}).map(function(k){return T_COMP_NOM[k];});
  var negItems=neg.map(function(k){return T_NEG[k]||k;});
  var progItems=prog.map(function(k){return T_PROG[k]||k;});
  var compNegatif=comp.indexOf("comportement")>=0;

  var hasPos=pos.length>0||gen.length>0;
  var hasNeg=neg.length>0;
  var hasProg=prog.length>0;

  function buildPos(){
    var adjs=adjPos.concat(adjComp);
    var noms=nomPos.concat(nomComp).concat(nomGen);
    if(adjs.length&&noms.length) return "Élève "+joinList(adjs)+", "+il+" fait preuve de "+joinList(noms)+".";
    if(adjs.length) return "Élève "+joinList(adjs)+", "+il+" s'investit avec sérieux.";
    if(noms.length) return Il+" fait preuve de "+joinList(noms)+".";
    return Il+" s'investit de manière satisfaisante.";
  }

  var p1="", p2="";

  if(hasPos&&hasNeg){
    p1=buildPos();
    p2=negItems.length===1?"Cependant, le "+negItems[0]+" reste un point à améliorer.":"Des efforts sont à fournir sur : "+joinList(negItems)+".";
    if(hasProg&&prog.indexOf("potentiel")<0) p2+=" "+Il+" affiche néanmoins "+joinList(progItems)+".";
  } else if(hasPos&&!hasNeg){
    p1=buildPos();
    if(hasProg){
      p2=Il+" affiche "+joinList(progItems)+". "+((pos.length+gen.length)>=3?"Excellent trimestre !":"Continuons dans cette dynamique.");
    } else {
      p2=(pos.length+gen.length)>=3?"Excellent trimestre, félicitations.":"Bon trimestre.";
    }
  } else if(!hasPos&&hasNeg){
    if(neg.indexOf("perturbateur")>=0){
      p1="Le comportement perturbateur de "+il+" nuit au bon déroulement des cours.";
      p2="Une attitude plus respectueuse est indispensable.";
    } else if(negItems.length===1){
      p1=Il+" présente un "+negItems[0]+" qui pénalise ses résultats.";
      p2="Une remobilisation est attendue.";
    } else {
      p1="Des points à améliorer : "+joinList(negItems)+".";
      p2="Un effort sérieux est nécessaire pour progresser.";
    }
    if(prog.indexOf("potentiel")>=0) p2+=" Le potentiel est là.";
  } else if(compNegatif&&!hasPos){
    p1="Le comportement de "+il+" est à revoir.";
    p2="Des efforts de respect et d'implication sont attendus.";
  } else if(hasProg&&!hasPos&&!hasNeg){
    if(prog.indexOf("potentiel")>=0){
      p1=Il+" dispose d'un réel potentiel qui reste à exploiter.";
      p2="Avec plus d'implication, les résultats pourraient être bien meilleurs.";
    } else {
      p1=Il+" affiche "+joinList(progItems)+" ce trimestre.";
      p2="Ces efforts méritent d'être soulignés.";
    }
  } else {
    p1=Il+" participe aux activités proposées.";
    p2="Des marges de progression existent.";
  }

  phrase=[p1,p2].filter(Boolean).join(" ");

  if(ft.length){
    var ctx=ft.join(", ");
    var sports=["badminton","tennis","basket","football","handball","volley","athlétisme","natation","gymnastique","rugby","judo","escalade","course","sprint","relais","demi-fond","ultimate","frisbee","acrosport","danse","boxe","lutte","vélo","cross","ping"];
    var profils=["ulis","segpa","dys","tdah","fragile","blessé","handicap","asthme","dispensé","inclusion","phobie","anxieux","anxieuse","allophone"];
    var isSport=ft.some(function(m){return sports.some(function(s){return m.toLowerCase().indexOf(s)>=0;});});
    var isProfil=ft.some(function(m){return profils.some(function(p){return m.toLowerCase().indexOf(p)>=0;});});
    if(isSport) phrase=phrase.replace(/\.$/,"")+", notamment en "+ctx+".";
    else if(isProfil) phrase=phrase.replace(/\.$/,"")+" Profil "+ctx+" pris en compte.";
    else phrase=phrase.replace(/\.$/,"")+". "+ctx.charAt(0).toUpperCase()+ctx.slice(1)+".";
  }

  document.getElementById("result-zone").style.display="block";
  document.getElementById("ok-banner").style.display="none";
  document.getElementById("rlabel").textContent=prenomCur?"Phrase pour "+prenomCur:"Phrase générée";
  document.getElementById("rtext").textContent=phrase;
  document.getElementById("rhint").textContent="Enregistrer pour sauvegarder, Regénérer pour varier.";
}

function populateAnnees(){
  var db=dbLoad();
  var annees=[];
  db.forEach(function(e){if(e.annee&&annees.indexOf(e.annee)<0)annees.push(e.annee);});
  annees.sort().reverse();
  ["filtre-annee","ecl-annee"].forEach(function(id){
    var el=document.getElementById(id);
    if(!el)return;
    el.innerHTML='<option value="toutes">Toutes années</option>'+annees.map(function(a){return '<option value="'+a+'">'+a+'</option>';}).join("");
  });
}

function enregistrer(){
  if(!phrase)return;
  var db=dbLoad();
  db.push({id:Date.now(),prenom:prenomCur||"—",classe:classeCur,matiere:matiereCur,genre:genre,phrase:phrase,date:new Date().toLocaleDateString("fr-FR"),trimestre:getTrimAuto(),annee:getAnnee()});
  dbSave(db);
  updateBadge();
  populateAnnees();
  var b=document.getElementById("ok-banner");
  b.style.display="block";
  setTimeout(function(){b.style.display="none";},2000);
}

function copierPhrase(){
  navigator.clipboard.writeText(phrase).catch(function(){
    var t=document.createElement("textarea");t.value=phrase;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);
  });
}

function resetForm(){
  sel={};
  document.getElementById("prenom").value="";
  document.getElementById("free").value="";
  document.getElementById("result-zone").style.display="none";
  phrase="";
  renderChips();
}

function filtrer(f,btn){
  filtreCur=f;
  document.querySelectorAll(".fbtn").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  renderListe();
}

function renderListe(){
  var db=dbLoad();
  var fm=document.getElementById("filtre-matiere").value;
  var ft=document.getElementById("filtre-trim").value;
  var fa=document.getElementById("filtre-annee").value;
  if(filtreCur!=="toutes") db=db.filter(function(e){return e.classe===filtreCur;});
  if(fm!=="toutes") db=db.filter(function(e){return e.matiere===fm;});
  if(ft!=="tous") db=db.filter(function(e){return (e.trimestre||"T1")===ft;});
  if(fa!=="toutes") db=db.filter(function(e){return (e.annee||"")===fa;});
  document.getElementById("lcounter").textContent=db.length+" élève(s)";
  var el=document.getElementById("elist");
  if(!db.length){el.innerHTML='<div class="empty">Aucune appréciation enregistrée.</div>';return;}
  el.innerHTML=db.map(function(e){
    return '<div class="eleve-item"><div class="eleve-info"><div class="eleve-nom">'+e.prenom+' <span style="font-weight:400;font-size:12px;color:var(--muted)">'+e.classe+'</span></div><div class="eleve-meta">'+(e.trimestre||"")+" "+(e.annee||"")+" · "+(e.matiere||"")+" · "+e.date+'</div><div class="eleve-phrase">'+e.phrase+'</div></div><div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0"><button class="ibtn" onclick="cpItem('+e.id+')">⎘</button><button class="ibtn danger" onclick="delItem('+e.id+')">🗑</button></div></div>';
  }).join("");
}

function cpItem(id){var e=dbLoad().filter(function(x){return x.id===id;})[0];if(e)navigator.clipboard.writeText(e.phrase).catch(function(){});}

function delItem(id){
  if(!confirm("Supprimer ?"))return;
  dbSave(dbLoad().filter(function(x){return x.id!==id;}));
  updateBadge();renderListe();renderExport();
}

function renderExport(){
  var fc=document.getElementById("ecl").value;
  var fm=document.getElementById("ecl-mat").value;
  var ft=document.getElementById("ecl-trim").value;
  var fa=document.getElementById("ecl-annee").value;
  var db=dbLoad();
  if(fc!=="toutes") db=db.filter(function(e){return e.classe===fc;});
  if(fm!=="toutes") db=db.filter(function(e){return e.matiere===fm;});
  if(ft!=="tous") db=db.filter(function(e){return (e.trimestre||"T1")===ft;});
  if(fa!=="toutes") db=db.filter(function(e){return (e.annee||"")===fa;});
  var el=document.getElementById("econtent");
  if(!db.length){el.textContent="Aucune appréciation.";return;}
  el.textContent=db.map(function(e){
    var meta=e.prenom+" ("+e.classe+(e.matiere?" · "+e.matiere:"")+(e.trimestre?" · "+e.trimestre:"")+(e.annee?" "+e.annee:"")+")";
    return meta+"\n"+e.phrase;
  }).join("\n\n");
}

function copierExport(){
  navigator.clipboard.writeText(document.getElementById("econtent").textContent).catch(function(){});
}

function updateBadge(){
  var n=dbLoad().length;
  document.getElementById("badge").textContent=n?"("+n+")":"";
}

function setTab(id){
  document.querySelectorAll(".tab").forEach(function(t,i){t.classList.toggle("active",["gen","liste","export"][i]===id);});
  document.querySelectorAll(".section").forEach(function(s){s.classList.remove("active");});
  document.getElementById(id).classList.add("active");
  if(id==="liste"){populateAnnees();renderListe();}
  if(id==="export"){populateAnnees();renderExport();}
}

updateMatieres();
renderChips();
updateBadge();
</script>
</body>
</html>
